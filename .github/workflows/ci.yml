name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: 强制覆盖已发布的 sdk/ 与当前版本 releases/*.tgz
        type: boolean
        default: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - 'packages/sdk-core/**'
              - 'packages/sdk-react/**'
              - 'packages/sdk-vue/**'
              - 'scripts/copy-sdk-umd.mjs'
              - 'scripts/prepare-sdk-pages.mjs'
              - 'packages/sdk-*/tsup.config.ts'

  unit:
    name: typecheck + unit
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/uniid.db
      AUTH_JWT_SECRET: dev_jwt_secret_must_be_at_least_32_chars
      SESSION_COOKIE_SECRET: dev_session_cookie_secret_must_be_32_chars
      PUBLIC_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test

  build:
    name: next build
    runs-on: ubuntu-latest
    needs: unit
    env:
      DATABASE_URL: file:./data/uniid.db
      AUTH_JWT_SECRET: dev_jwt_secret_must_be_at_least_32_chars
      SESSION_COOKIE_SECRET: dev_session_cookie_secret_must_be_32_chars
      PUBLIC_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  sdk:
    name: sdk build
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run sdk:build:core

  publish-sdk-pages:
    name: publish sdk to GitHub Pages
    runs-on: ubuntu-latest
    needs: [sdk, changes]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.sdk == 'true')
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run sdk:build:core

      - name: Fetch existing GitHub Pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _pages_prev
        continue-on-error: true

      - name: Prepare Pages artifact
        env:
          PAGES_OUT: _site
          PAGES_PREV: _pages_prev
          PACK_ON_VERSION: "1"
          FORCE_OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_overwrite == true && '1' || '' }}
        run: node scripts/prepare-sdk-pages.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Sync gh-pages branch (retain historical releases)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: false
