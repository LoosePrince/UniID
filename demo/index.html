<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UniID Demo · 米色博客</title>
    <style>
      :root {
        --cream-50: #fbf9f4;
        --cream-100: #f6f2e9;
        --sand-200: #e9e1ce;
        --ink-900: #13110e;
        --ink-700: #3c3833;
        --ink-500: #6b645a;
        --accent: #5b5bd6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Geist", "PingFang SC", "Inter", system-ui, sans-serif;
        background: var(--cream-50);
        color: var(--ink-900);
        -webkit-font-smoothing: antialiased;
      }
      header {
        position: sticky; top: 0; z-index: 10;
        background: rgba(251, 249, 244, 0.85);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--sand-200);
      }
      .container { max-width: 760px; margin: 0 auto; padding: 16px 24px; }
      .hdr { display: flex; align-items: center; justify-content: space-between; }
      .brand { font-weight: 600; letter-spacing: -0.01em; }
      .muted { color: var(--ink-500); font-size: 14px; }
      main { padding: 32px 24px 96px; }
      h1 { font-size: 32px; letter-spacing: -0.02em; margin: 0 0 8px; }
      .card {
        background: #fff;
        border: 1px solid var(--sand-200);
        border-radius: 14px;
        padding: 20px;
        margin: 16px 0;
        box-shadow: 0 1px 2px rgba(20,18,14,0.04);
      }
      textarea, input {
        width: 100%; padding: 10px 12px; border-radius: 10px;
        border: 1px solid var(--sand-200); background: var(--cream-50);
        font: inherit; color: inherit; outline: none;
      }
      textarea { min-height: 96px; resize: vertical; }
      button {
        font: inherit; cursor: pointer; border: 0;
        border-radius: 10px; padding: 10px 16px; transition: opacity 0.15s;
      }
      button:hover { opacity: 0.92; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary { background: var(--ink-900); color: var(--cream-50); }
      .btn-ghost   { background: transparent; color: var(--ink-700); }
      .row { display: flex; gap: 8px; align-items: center; }
      ul.posts { list-style: none; padding: 0; margin: 0; }
      ul.posts li {
        padding: 14px 0; border-top: 1px solid var(--sand-200);
      }
      ul.posts li:first-child { border-top: 0; }
      .title { font-weight: 600; margin: 0 0 4px; }
      .meta { font-size: 12px; color: var(--ink-500); }
      .pill {
        display: inline-block; padding: 1px 8px; border-radius: 999px;
        font-size: 11px; background: var(--cream-100); color: var(--ink-700);
        border: 1px solid var(--sand-200);
      }
      #status { font-size: 13px; color: var(--ink-500); margin-top: 8px; }
    </style>
  </head>
  <body>
    <header>
      <div class="container hdr">
        <div class="brand">UniID Demo · 米色博客</div>
        <div class="row">
          <span id="user" class="muted">未登录</span>
          <button id="btn-login" class="btn-primary" type="button">登录 / 授权</button>
          <button id="btn-logout" class="btn-ghost" type="button" hidden>退出</button>
        </div>
      </div>
    </header>

    <main class="container">
      <h1>所有文章</h1>
      <p class="muted">
        用 <code>@uniid/sdk</code> 的 Auth + Data + Realtime。请先
        <code>npm run dev</code> 与 <code>npm run demo</code>，详见
        <a href="./README.md">demo/README.md</a>。
      </p>
      <p id="status" class="muted"></p>

      <section class="card" id="composer" hidden>
        <div class="row" style="justify-content: space-between; margin-bottom: 8px;">
          <strong>写一篇</strong>
          <span class="pill">需要登录</span>
        </div>
        <input id="title" placeholder="标题" />
        <textarea id="content" placeholder="内容（支持纯文本）"></textarea>
        <div class="row" style="margin-top: 8px;">
          <button id="btn-publish" class="btn-primary" type="button">发布</button>
          <span id="composer-msg" class="muted"></span>
        </div>
      </section>

      <ul class="posts" id="list"></ul>
    </main>

    <script src="./config.js"></script>
    <script src="./sdk/uniid.umd.js"></script>
    <script>
      const uniid = createUniID();
      const statusEl = document.getElementById("status");
      statusEl.textContent = `API: ${UNIID_DEMO.url} · App: ${UNIID_DEMO.appId}`;

      const userEl = document.getElementById("user");
      const btnLogin = document.getElementById("btn-login");
      const btnLogout = document.getElementById("btn-logout");
      const composer = document.getElementById("composer");
      const list = document.getElementById("list");
      const btnPublish = document.getElementById("btn-publish");
      const titleInput = document.getElementById("title");
      const contentInput = document.getElementById("content");
      const msg = document.getElementById("composer-msg");

      const loginOpts = { parentOrigin: window.location.origin };

      function renderUser(user) {
        if (user) {
          userEl.textContent = user.displayName ?? user.username;
          btnLogin.hidden = true;
          btnLogout.hidden = false;
          composer.hidden = false;
        } else {
          userEl.textContent = "未登录";
          btnLogin.hidden = false;
          btnLogout.hidden = true;
          composer.hidden = true;
        }
      }

      function renderPosts(records) {
        list.innerHTML = "";
        for (const r of records) {
          const li = document.createElement("li");
          li.innerHTML = `
            <p class="title"></p>
            <p class="meta"></p>
            <p class="body" style="margin: 4px 0 0; color: var(--ink-700);"></p>
          `;
          li.querySelector(".title").textContent = r.data.title ?? "(无标题)";
          li.querySelector(".meta").textContent =
            `${r.ownerId ?? "anonymous"} · ${new Date(r.createdAt * 1000).toLocaleString()}`;
          li.querySelector(".body").textContent = r.data.content ?? "";
          list.appendChild(li);
        }
      }

      async function reload() {
        try {
          const res = await uniid.from("post").orderBy({ createdAt: "desc" }).limit(20).run();
          const rows = Array.isArray(res.records) ? res.records : [];
          renderPosts(rows);
        } catch (err) {
          console.warn("加载文章失败：", err);
          statusEl.textContent = `加载失败: ${err?.message ?? err}`;
        }
      }

      btnLogin.onclick = async () => {
        try {
          const u = await uniid.auth.login(loginOpts);
          renderUser(u);
          await reload();
        } catch (err) {
          console.warn(err);
          statusEl.textContent = `登录失败: ${err?.message ?? err}（请先在 ${UNIID_DEMO.url}/login 登录 UniID 账户）`;
        }
      };

      btnLogout.onclick = async () => {
        await uniid.auth.logout();
        renderUser(null);
      };

      btnPublish.onclick = async () => {
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();
        if (!title) {
          msg.textContent = "标题不能为空";
          return;
        }
        btnPublish.disabled = true;
        msg.textContent = "发布中...";
        try {
          await uniid.from("post").insert({ title, content, status: "published" });
          titleInput.value = "";
          contentInput.value = "";
          msg.textContent = "已发布";
          await reload();
        } catch (err) {
          msg.textContent = err?.message ?? "发布失败";
        } finally {
          btnPublish.disabled = false;
        }
      };

      let realtimeChannel = null;

      function bindRealtime() {
        if (!uniid.auth.user || typeof EventSource === "undefined") return;
        if (realtimeChannel) return;
        try {
          realtimeChannel = uniid.realtime.channel(`records:${UNIID_DEMO.appId}:post`);
          realtimeChannel.on("insert", reload);
          realtimeChannel.on("update", reload);
          realtimeChannel.on("delete", reload);
          realtimeChannel.subscribe();
        } catch (err) {
          console.warn("Realtime 未连接", err);
        }
      }

      function renderUserAndRealtime(user) {
        renderUser(user);
        if (user) bindRealtime();
        else if (realtimeChannel) {
          realtimeChannel.unsubscribe();
          realtimeChannel = null;
        }
      }

      renderUserAndRealtime(uniid.auth.user);
      uniid.auth.onChange(renderUserAndRealtime);
      uniid.auth.check().then(() => reload()).catch(() => reload());
    </script>
  </body>
</html>
