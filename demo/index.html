<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <title>UniID Demo Blog - 完整功能演示</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --bg-soft: #020824;
      --card-bg: rgba(15, 23, 42, 0.9);
      --card-border: rgba(148, 163, 184, 0.1);
      --accent: #0ea5e9;
      --accent-soft: rgba(56, 189, 248, 0.25);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --divider: rgba(15, 23, 42, 0.9);
      --radius-lg: 0.9rem;
      --radius-md: 0.5rem;
      --shadow-strong: 0 24px 60px rgba(15, 23, 42, 0.9);
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.8);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 55%),
        radial-gradient(circle at bottom, rgba(129, 140, 248, 0.2), transparent 55%),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    .page {
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 55%),
        var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(22px);
      margin-bottom: 1.5rem;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(148, 163, 184, 0.06);
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 0.03em;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #22c1c3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
    }

    .user-details {
      text-align: right;
    }

    .username {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .user-status {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    button {
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #22c1c3);
      color: white;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      box-shadow: 0 12px 25px rgba(14, 165, 233, 0.45);
      transition: all 130ms ease-out;
      border: 1px solid rgba(34, 211, 238, 0.5);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(14, 165, 233, 0.55);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.45);
    }

    button.secondary {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #1e293b;
      color: #e2e8f0;
      box-shadow: none;
    }

    button.secondary:hover:not(:disabled) {
      background: rgba(30, 41, 59, 0.9);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.5);
    }

    button.danger {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      box-shadow: none;
    }

    button.danger:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.3);
      box-shadow: 0 8px 16px rgba(239, 68, 68, 0.25);
    }

    button.small {
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      box-shadow: none;
    }

    button.active {
      background: linear-gradient(135deg, var(--success), #16a34a);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.45), transparent);
      margin: 1.5rem 0;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-section {
      background: rgba(2, 6, 23, 0.5);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      border: 1px solid #1e293b;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: #cbd5f5;
    }

    input, textarea {
      width: 100%;
      border-radius: var(--radius-md);
      border: 1px solid #1e293b;
      background: rgba(2, 6, 23, 0.9);
      color: var(--text);
      padding: 0.6rem 0.8rem;
      font-size: 0.9rem;
      outline: none;
      transition: all 130ms ease-out;
      font-family: inherit;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(148, 163, 184, 0.75);
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-soft);
      background: #020617;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .error {
      padding: 0.75rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-md);
      color: #fecaca;
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }

    .success {
      padding: 0.75rem;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: var(--radius-md);
      color: #86efac;
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }

    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .post-card {
      background: rgba(15, 23, 42, 0.6);
      border-radius: var(--radius-md);
      border: 1px solid rgba(30, 64, 175, 0.4);
      padding: 1.25rem;
      transition: all 130ms ease-out;
    }

    .post-card:hover {
      border-color: rgba(56, 189, 248, 0.6);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.8);
    }

    .post-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .post-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      color: #f1f5f9;
    }

    .post-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .post-author {
      color: var(--accent);
      font-weight: 500;
    }

    .post-content {
      font-size: 0.9rem;
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 1rem;
      white-space: pre-wrap;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(30, 41, 59, 0.8);
    }

    .post-stats {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-left: auto;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .stat-item.liked {
      color: var(--danger);
    }

    .comments-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(30, 41, 59, 0.8);
    }

    .comments-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .comment {
      background: rgba(2, 6, 23, 0.4);
      border-radius: 0.5rem;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .comment-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.35rem;
    }

    .comment-author {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
    }

    .comment-time {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .comment-content {
      font-size: 0.85rem;
      color: #cbd5e1;
    }

    .comment-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .comment-form input {
      flex: 1;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }

    .modal {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-strong);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .close-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
    }

    #uniid-auth-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(420px, 100% - 2.5rem);
      height: min(520px, 100% - 2.5rem);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.98), 0 0 0 100vmax rgba(15, 23, 42, 0.75);
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.96), #020617);
      backdrop-filter: blur(18px);
      z-index: 50;
      overflow: hidden;
    }

    #userView {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .page { padding: 1rem; }
      .card { padding: 1.25rem; }
      .header { flex-direction: column; align-items: flex-start; }
      .user-info { width: 100%; justify-content: space-between; }
      .user-details { text-align: left; }
      .post-header { flex-direction: column; }
      .post-actions { flex-wrap: wrap; }
      .post-stats { width: 100%; margin-left: 0; margin-top: 0.5rem; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="container">
      <!-- 头部卡片 -->
      <div class="card">
        <div class="header">
          <div>
            <h1>📝 UniID Demo Blog</h1>
            <div class="subtitle">完整功能演示：发帖、查看、编辑、删除、评论、点赞</div>
          </div>
          <div class="user-info" id="userSection">
            <div id="guestView">
              <button id="loginButton">登录 / 授权</button>
            </div>
            <div id="userView" class="hidden">
              <div class="user-details">
                <div class="username" id="usernameDisplay">-</div>
                <div class="user-status">已登录</div>
              </div>
              <div class="user-avatar" id="userAvatar">-</div>
              <button id="logoutButton" class="secondary small">退出</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 发帖表单 -->
      <div class="card" id="postFormCard">
        <div class="section-title">✏️ 发表新帖子</div>
        <div class="form-section">
          <form id="postForm">
            <div class="field">
              <label for="postTitle">标题</label>
              <input type="text" id="postTitle" placeholder="输入帖子标题..." required />
            </div>
            <div class="field">
              <label for="postContent">内容</label>
              <textarea id="postContent" placeholder="分享你的想法..." required></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" id="submitPostBtn">发布帖子</button>
            </div>
          </form>
          <div id="formMessage" class="hidden"></div>
        </div>
      </div>

      <!-- 帖子列表 -->
      <div class="card">
        <div class="section-title">
          <span>📚 帖子列表</span>
          <button class="secondary small" id="refreshBtn">🔄 刷新</button>
        </div>
        <div id="postsContainer" class="posts-list">
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <div>暂无帖子，快来发表第一篇吧！</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑帖子模态框 -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">✏️ 编辑帖子</h3>
        <button class="close-btn" id="closeEditModal">&times;</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editPostId" />
        <div class="field">
          <label for="editTitle">标题</label>
          <input type="text" id="editTitle" required />
        </div>
        <div class="field">
          <label for="editContent">内容</label>
          <textarea id="editContent" required></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="secondary" id="cancelEdit">取消</button>
          <button type="submit">保存修改</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 授权 iframe -->
  <div id="uniid-auth-frame" style="display: none;"></div>

  <script src="http://localhost:3000/sdk/auth.js"></script>
  <script>
    (function () {
      // 初始化 AuthSDK
      const auth = new window.AuthSDK({
        authServer: "http://localhost:3000",
        appId: "demo-blog",
        mountId: "uniid-auth-frame"
      });

      // 状态管理
      const state = {
        user: null,
        posts: [],
        editingPostId: null
      };

      // DOM 元素
      const elements = {
        loginButton: document.getElementById("loginButton"),
        logoutButton: document.getElementById("logoutButton"),
        guestView: document.getElementById("guestView"),
        userView: document.getElementById("userView"),
        usernameDisplay: document.getElementById("usernameDisplay"),
        userAvatar: document.getElementById("userAvatar"),
        postForm: document.getElementById("postForm"),
        postFormCard: document.getElementById("postFormCard"),
        postTitle: document.getElementById("postTitle"),
        postContent: document.getElementById("postContent"),
        submitPostBtn: document.getElementById("submitPostBtn"),
        formMessage: document.getElementById("formMessage"),
        postsContainer: document.getElementById("postsContainer"),
        refreshBtn: document.getElementById("refreshBtn"),
        editModal: document.getElementById("editModal"),
        editForm: document.getElementById("editForm"),
        editPostId: document.getElementById("editPostId"),
        editTitle: document.getElementById("editTitle"),
        editContent: document.getElementById("editContent"),
        closeEditModal: document.getElementById("closeEditModal"),
        cancelEdit: document.getElementById("cancelEdit")
      };

      // 工具函数
      function formatTime(timestamp) {
        const date = new Date(timestamp * 1000);
        return date.toLocaleString("zh-CN");
      }

      function getAvatarLetter(username) {
        return username ? username.charAt(0).toUpperCase() : "?";
      }

      function showMessage(message, type = "error") {
        elements.formMessage.textContent = message;
        elements.formMessage.className = type === "success" ? "success" : "error";
        elements.formMessage.classList.remove("hidden");
        setTimeout(() => {
          elements.formMessage.classList.add("hidden");
        }, 5000);
      }

      // 用户状态管理
      function updateUserUI() {
        if (state.user) {
          elements.guestView.classList.add("hidden");
          elements.userView.classList.remove("hidden");
          elements.usernameDisplay.textContent = state.user.username;
          elements.userAvatar.textContent = getAvatarLetter(state.user.username);
          elements.postFormCard.classList.remove("hidden");
        } else {
          elements.guestView.classList.remove("hidden");
          elements.userView.classList.add("hidden");
          elements.postFormCard.classList.add("hidden");
        }
      }

      // 加载帖子列表
      async function loadPosts() {
        try {
          // 统一使用 /api/data/query 接口，根据有无 Token 返回不同数据
          const headers = { "Content-Type": "application/json" };
          if (auth.token) {
            headers["Authorization"] = "Bearer " + auth.token;
          }

          const res = await fetch(auth.authServer + "/api/data/query", {
            method: "POST",
            headers,
            credentials: "include",
            body: JSON.stringify({
              app_id: "demo-blog",
              data_type: "post"
            })
          });

          const result = await res.json();
          state.posts = result.items || [];
          renderPosts();
        } catch (err) {
          console.error("加载帖子失败:", err);
          elements.postsContainer.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">⚠️</div>
              <div>加载失败，请稍后重试</div>
            </div>
          `;
        }
      }

      // 渲染帖子列表
      function renderPosts() {
        if (state.posts.length === 0) {
          elements.postsContainer.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📝</div>
              <div>暂无帖子，快来发表第一篇吧！</div>
            </div>
          `;
          return;
        }

        elements.postsContainer.innerHTML = state.posts.map(post => {
          const data = post.data || {};
          const isOwner = state.user && post.owner_id === state.user.id;
          const comments = data.comments || {};
          const commentCount = Object.keys(comments).length;
          const likes = data.likes || {};
          const likeCount = Object.keys(likes).length;
          const userLiked = state.user && likes[state.user.id];

          return `
            <div class="post-card" data-post-id="${post.id}">
              <div class="post-header">
                <div>
                  <h3 class="post-title">${escapeHtml(data.title || "无标题")}</h3>
                  <div class="post-meta">
                    <span class="post-author">@${escapeHtml(post.owner_name || "未知用户")}</span>
                    <span>·</span>
                    <span>${formatTime(post.created_at)}</span>
                  </div>
                </div>
                ${isOwner ? `
                  <div>
                    <button class="secondary small" onclick="editPost('${post.id}')">编辑</button>
                    <button class="danger small" onclick="deletePost('${post.id}')">删除</button>
                  </div>
                ` : ""}
              </div>
              <div class="post-content">${escapeHtml(data.content || "")}</div>
              <div class="post-actions">
                <button class="small ${userLiked ? "active" : "secondary"}" onclick="toggleLike('${post.id}')">
                  ${userLiked ? "❤️" : "🤍"} 点赞 (${likeCount})
                </button>
                <button class="secondary small" onclick="toggleComments('${post.id}')">
                  💬 评论 (${commentCount})
                </button>
              </div>
              <div id="comments-${post.id}" class="comments-section hidden">
                <div class="comments-title">评论 (${commentCount})</div>
                ${renderComments(comments)}
                ${state.user ? `
                  <div class="comment-form">
                    <input type="text" id="comment-input-${post.id}" placeholder="写下你的评论..." />
                    <button onclick="addComment('${post.id}')">发送</button>
                  </div>
                ` : `<div class="comment-form"><em style="color: var(--text-muted); font-size: 0.85rem;">登录后可发表评论</em></div>`}
              </div>
            </div>
          `;
        }).join("");
      }

      function renderComments(comments) {
        const commentList = Object.entries(comments);
        if (commentList.length === 0) {
          return `<div style="color: var(--text-muted); font-size: 0.85rem; padding: 0.5rem 0;">暂无评论</div>`;
        }
        return commentList.map(([userId, comment]) => `
          <div class="comment">
            <div class="comment-header">
              <span class="comment-author">@${escapeHtml(comment.username || userId)}</span>
              <span class="comment-time">${formatTime(comment.time)}</span>
            </div>
            <div class="comment-content">${escapeHtml(comment.content)}</div>
          </div>
        `).join("");
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // 发帖
      elements.postForm.onsubmit = async (e) => {
        e.preventDefault();
        if (!state.user) {
          showMessage("请先登录");
          return;
        }

        const title = elements.postTitle.value.trim();
        const content = elements.postContent.value.trim();

        if (!title || !content) {
          showMessage("标题和内容不能为空");
          return;
        }

        elements.submitPostBtn.disabled = true;
        elements.submitPostBtn.textContent = "发布中...";

        try {
          const data = {
            title,
            content,
            likes: {},
            comments: {}
          };

          const permissions = {
            default: {
              read: ["$all"],
              write: ["$owner"],
              delete: ["$owner"]
            },
            fields: {
              "data.title": { read: ["$all"], write: ["$owner"] },
              "data.content": { read: ["$all"], write: ["$owner"] },
              "data.likes": { read: ["$all"], write: ["$all"] },
              "data.comments": { read: ["$all"], write: ["$all"] }
            }
          };

          await auth.create("post", data, permissions);
          showMessage("发布成功！", "success");
          elements.postTitle.value = "";
          elements.postContent.value = "";
          await loadPosts();
        } catch (err) {
          console.error("发帖失败:", err);
          showMessage("发布失败: " + (err.message || "未知错误"));
        } finally {
          elements.submitPostBtn.disabled = false;
          elements.submitPostBtn.textContent = "发布帖子";
        }
      };

      // 编辑帖子
      window.editPost = (postId) => {
        const post = state.posts.find(p => p.id === postId);
        if (!post) return;

        state.editingPostId = postId;
        elements.editPostId.value = postId;
        elements.editTitle.value = post.data.title || "";
        elements.editContent.value = post.data.content || "";
        elements.editModal.classList.remove("hidden");
      };

      elements.closeEditModal.onclick = () => {
        elements.editModal.classList.add("hidden");
        state.editingPostId = null;
      };

      elements.cancelEdit.onclick = () => {
        elements.editModal.classList.add("hidden");
        state.editingPostId = null;
      };

      elements.editForm.onsubmit = async (e) => {
        e.preventDefault();
        if (!state.editingPostId) return;

        const title = elements.editTitle.value.trim();
        const content = elements.editContent.value.trim();

        try {
          await auth.update(state.editingPostId, { title, content });
          showMessage("修改成功！", "success");
          elements.editModal.classList.add("hidden");
          state.editingPostId = null;
          await loadPosts();
        } catch (err) {
          console.error("编辑失败:", err);
          showMessage("编辑失败: " + (err.message || "未知错误"));
        }
      };

      // 删除帖子
      window.deletePost = async (postId) => {
        if (!confirm("确定要删除这篇帖子吗？此操作不可恢复。")) return;

        try {
          await auth.delete(postId);
          showMessage("删除成功！", "success");
          await loadPosts();
        } catch (err) {
          console.error("删除失败:", err);
          showMessage("删除失败: " + (err.message || "未知错误"));
        }
      };

      // 点赞功能
      window.toggleLike = async (postId) => {
        if (!state.user) {
          showMessage("请先登录");
          return;
        }

        try {
          const post = state.posts.find(p => p.id === postId);
          if (!post) return;

          const likes = { ...(post.data.likes || {}) };
          const userId = state.user.id;

          if (likes[userId]) {
            delete likes[userId];
          } else {
            likes[userId] = { time: Math.floor(Date.now() / 1000) };
          }

          await auth.update(postId, { likes });
          await loadPosts();
        } catch (err) {
          console.error("点赞失败:", err);
          showMessage("操作失败: " + (err.message || "未知错误"));
        }
      };

      // 评论功能
      window.toggleComments = (postId) => {
        const commentsSection = document.getElementById(`comments-${postId}`);
        if (commentsSection) {
          commentsSection.classList.toggle("hidden");
        }
      };

      window.addComment = async (postId) => {
        if (!state.user) {
          showMessage("请先登录");
          return;
        }

        const input = document.getElementById(`comment-input-${postId}`);
        const content = input.value.trim();

        if (!content) {
          showMessage("评论内容不能为空");
          return;
        }

        try {
          const post = state.posts.find(p => p.id === postId);
          if (!post) return;

          const comments = { ...(post.data.comments || {}) };
          const commentId = `${state.user.id}_${Date.now()}`;

          comments[commentId] = {
            userId: state.user.id,
            username: state.user.username,
            content,
            time: Math.floor(Date.now() / 1000)
          };

          await auth.update(postId, { comments });
          input.value = "";
          await loadPosts();

          // 保持评论区展开
          setTimeout(() => {
            const commentsSection = document.getElementById(`comments-${postId}`);
            if (commentsSection) commentsSection.classList.remove("hidden");
          }, 100);
        } catch (err) {
          console.error("评论失败:", err);
          showMessage("评论失败: " + (err.message || "未知错误"));
        }
      };

      // 登录/退出
      elements.loginButton.onclick = async () => {
        elements.loginButton.disabled = true;
        elements.loginButton.textContent = "登录中...";

        try {
          const result = await auth.login();
          if (result && result.user) {
            state.user = result.user;
            localStorage.setItem("demo_user", JSON.stringify(result.user));
            updateUserUI();
            await loadPosts();
          }
        } catch (err) {
          console.error("登录失败:", err);
          showMessage("登录失败");
        } finally {
          elements.loginButton.disabled = false;
          elements.loginButton.textContent = "登录 / 授权";
        }
      };

      elements.logoutButton.onclick = async () => {
        try {
          await auth.logout();
          state.user = null;
          localStorage.removeItem("demo_user");
          updateUserUI();
          await loadPosts();
        } catch (err) {
          console.error("退出失败:", err);
        }
      };

      elements.refreshBtn.onclick = loadPosts;

      // 初始化
      function init() {
        // 恢复用户状态
        const savedUser = localStorage.getItem("demo_user");
        if (savedUser) {
          try {
            state.user = JSON.parse(savedUser);
          } catch (e) {
            console.error("恢复用户状态失败", e);
          }
        }

        updateUserUI();
        loadPosts();
      }

      init();
    })();
  </script>
</body>

</html>
