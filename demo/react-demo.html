<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UniID Demo · React</title>
    <style>
      body {
        margin: 0; padding: 32px;
        background: #fbf9f4;
        color: #13110e;
        font-family: "Geist","PingFang SC","Inter",system-ui,sans-serif;
      }
      h1 { font-size: 28px; letter-spacing: -0.02em; }
      .card { background: #fff; border: 1px solid #e9e1ce; border-radius: 14px; padding: 20px; max-width: 680px; }
      button { background: #13110e; color: #fbf9f4; border: 0; padding: 8px 16px; border-radius: 10px; cursor: pointer; }
      ul { padding-left: 18px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script type="module">
      // 在生产部署中，请使用打包过的 React + @uniid/sdk-react 包。
      // 这里走最小化 demo：手动通过 UniID 实例 + React 状态管理。
    </script>
    <script src="../public/sdk/uniid.umd.js"></script>
    <script type="text/babel">
      // 简化版（无 @uniid/sdk-react 直接 UMD）：把 SDK 当成普通对象。
      const { useEffect, useState, useCallback } = React;
      const uniid = new UniID({ url: window.location.origin.replace(/:\d+$/, ":3000"), appId: "app_demo_blog" });

      function App() {
        const [user, setUser] = useState(uniid.auth.user);
        const [list, setList] = useState([]);
        useEffect(() => uniid.auth.onChange(setUser), []);
        const load = useCallback(async () => {
          const r = await uniid.from("post").orderBy({ createdAt: "desc" }).limit(20).run();
          setList(r.records);
        }, []);
        useEffect(() => { load(); }, [load]);

        return (
          <div className="card">
            <h1>React Demo</h1>
            <p>{user ? `欢迎，${user.displayName ?? user.username}` : "未登录"}</p>
            {user
              ? <button onClick={() => uniid.auth.logout()}>退出</button>
              : <button onClick={() => uniid.auth.login().then(load)}>登录</button>}
            <ul>
              {list.map(r => <li key={r.id}>{r.data.title}</li>)}
            </ul>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
