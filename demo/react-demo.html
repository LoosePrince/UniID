<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UniID Demo · React</title>
    <style>
      body {
        margin: 0; padding: 32px;
        background: #fbf9f4;
        color: #13110e;
        font-family: "Geist","PingFang SC","Inter",system-ui,sans-serif;
      }
      h1 { font-size: 28px; letter-spacing: -0.02em; }
      .card { background: #fff; border: 1px solid #e9e1ce; border-radius: 14px; padding: 20px; max-width: 680px; }
      button { background: #13110e; color: #fbf9f4; border: 0; padding: 8px 16px; border-radius: 10px; cursor: pointer; margin-right: 8px; }
      ul { padding-left: 18px; }
      .muted { color: #6b645a; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="./config.js"></script>
    <script src="./sdk/uniid.umd.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
      const { useEffect, useState, useCallback, createElement: h } = React;
      const uniid = createUniID();
      const loginOpts = { parentOrigin: window.location.origin };

      function App() {
        const [user, setUser] = useState(uniid.auth.user);
        const [list, setList] = useState([]);
        const [err, setErr] = useState("");

        useEffect(() => uniid.auth.onChange(setUser), []);

        const load = useCallback(async () => {
          try {
            setErr("");
            const r = await uniid.from("post").orderBy({ createdAt: "desc" }).limit(20).run();
            setList(r.records);
          } catch (e) {
            setErr(e?.message ?? String(e));
          }
        }, []);

        useEffect(() => {
          uniid.auth.check().finally(load);
        }, [load]);

        return h("div", { className: "card" }, [
          h("h1", null, "React Demo"),
          h("p", { className: "muted" }, `API: ${UNIID_DEMO.url} · App: ${UNIID_DEMO.appId}`),
          h("p", null, user ? `欢迎，${user.displayName ?? user.username}` : "未登录"),
          user
            ? h("button", { type: "button", onClick: () => uniid.auth.logout() }, "退出")
            : h("button", {
                type: "button",
                onClick: () => uniid.auth.login(loginOpts).then(load).catch((e) => setErr(e?.message ?? String(e)))
              }, "登录"),
          err ? h("p", { className: "muted" }, err) : null,
          h(
            "ul",
            null,
            list.map((r) => h("li", { key: r.id }, r.data.title ?? "(无标题)"))
          )
        ]);
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
