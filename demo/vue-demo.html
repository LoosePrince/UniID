<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UniID Demo · Vue 3</title>
    <style>
      body {
        margin: 0; padding: 32px;
        background: #fbf9f4; color: #13110e;
        font-family: "Geist","PingFang SC","Inter",system-ui,sans-serif;
      }
      h1 { font-size: 28px; letter-spacing: -0.02em; }
      .card { background: #fff; border: 1px solid #e9e1ce; border-radius: 14px; padding: 20px; max-width: 680px; }
      button { background: #13110e; color: #fbf9f4; border: 0; padding: 8px 16px; border-radius: 10px; cursor: pointer; }
      ul { padding-left: 18px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="card">
        <h1>Vue Demo</h1>
        <p v-if="user">欢迎，{{ user.displayName ?? user.username }}</p>
        <p v-else>未登录</p>
        <button v-if="user" @click="logout">退出</button>
        <button v-else @click="login">登录</button>
        <ul>
          <li v-for="r in list" :key="r.id">{{ r.data.title }}</li>
        </ul>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3.4/dist/vue.global.prod.js"></script>
    <script src="../public/sdk/uniid.umd.js"></script>
    <script>
      const { createApp, ref, onMounted } = Vue;
      const uniid = new UniID({ url: window.location.origin.replace(/:\d+$/, ":3000"), appId: "app_demo_blog" });

      createApp({
        setup() {
          const user = ref(uniid.auth.user);
          const list = ref([]);
          uniid.auth.onChange((u) => { user.value = u; });
          const reload = async () => {
            const r = await uniid.from("post").orderBy({ createdAt: "desc" }).limit(20).run();
            list.value = r.records;
          };
          onMounted(reload);
          return {
            user, list,
            login: async () => { await uniid.auth.login(); await reload(); },
            logout: () => uniid.auth.logout()
          };
        }
      }).mount("#app");
    </script>
  </body>
</html>
